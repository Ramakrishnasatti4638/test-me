<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Product Store</h1>
    <button id="cart-toggle" class="cart-icon">
      🛒 Cart (<span id="cart-count">0</span>)
    </button>
  </header>

  <main class="container">
    <div class="product-grid">
      <div class="product-card">
        <div class="product-image">📱</div>
        <h3>Smartphone Pro</h3>
        <p class="price">$799.99</p>
        <button class="add-to-cart" data-id="1" data-name="Smartphone Pro" data-price="799.99">Add to Cart</button>
      </div>

      <div class="product-card">
        <div class="product-image">💻</div>
        <h3>Laptop Ultra</h3>
        <p class="price">$1,299.99</p>
        <button class="add-to-cart" data-id="2" data-name="Laptop Ultra" data-price="1299.99">Add to Cart</button>
      </div>

      <div class="product-card">
        <div class="product-image">🎧</div>
        <h3>Wireless Headphones</h3>
        <p class="price">$199.99</p>
        <button class="add-to-cart" data-id="3" data-name="Wireless Headphones" data-price="199.99">Add to Cart</button>
      </div>

      <div class="product-card">
        <div class="product-image">⌚</div>
        <h3>Smart Watch</h3>
        <p class="price">$349.99</p>
        <button class="add-to-cart" data-id="4" data-name="Smart Watch" data-price="349.99">Add to Cart</button>
      </div>

      <div class="product-card">
        <div class="product-image">📷</div>
        <h3>Digital Camera</h3>
        <p class="price">$599.99</p>
        <button class="add-to-cart" data-id="5" data-name="Digital Camera" data-price="599.99">Add to Cart</button>
      </div>

      <div class="product-card">
        <div class="product-image">🎮</div>
        <h3>Gaming Console</h3>
        <p class="price">$499.99</p>
        <button class="add-to-cart" data-id="6" data-name="Gaming Console" data-price="499.99">Add to Cart</button>
      </div>
    </div>
  </main>

  <!-- Cart Sidebar -->
  <div id="cart-sidebar" class="cart-sidebar">
    <div class="cart-header">
      <h2>Shopping Cart</h2>
      <button id="close-cart" class="close-btn">✕</button>
    </div>
    
    <div id="cart-items" class="cart-items">
      <p class="empty-cart">Your cart is empty</p>
    </div>
    
    <div class="cart-footer">
      <div class="cart-total">
        <strong>Total:</strong>
        <span id="cart-total">$0.00</span>
      </div>
      <button class="checkout-btn">Checkout</button>
    </div>
  </div>

  <div id="cart-overlay" class="cart-overlay"></div>

  <script src="script.js"></script>
</body>
</html>
