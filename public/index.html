<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Listing - Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🛍️ Product Store</h1>
            <button id="cart-toggle" class="cart-button">
                🛒 Cart (<span id="cart-count">0</span>)
            </button>
        </div>
    </header>

    <main class="container">
        <div id="products-grid" class="products-grid">
            <!-- Products will be loaded here -->
        </div>
    </main>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2>Shopping Cart</h2>
            <button id="close-cart" class="close-button">&times;</button>
        </div>
        
        <div id="cart-items" class="cart-items">
            <!-- Cart items will be loaded here -->
        </div>

        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button id="clear-cart" class="clear-cart-button">Clear Cart</button>
        </div>
    </div>

    <!-- Overlay -->
    <div id="overlay" class="overlay"></div>

    <script src="app.js"></script>
</body>
</html>
