<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Listing - Shopping Cart</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Tech Store</h1>
            <button id="cartToggle" class="cart-button">
                🛒 Cart <span id="cartCount" class="cart-count">0</span>
            </button>
        </div>
    </header>

    <main class="container">
        <h2>Our Products</h2>
        <div id="productGrid" class="product-grid">
            <!-- Products will be loaded here dynamically -->
        </div>
    </main>

    <!-- Cart Sidebar -->
    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2>Shopping Cart</h2>
            <button id="closeCart" class="close-btn">&times;</button>
        </div>
        
        <div id="cartItems" class="cart-items">
            <!-- Cart items will be loaded here -->
        </div>
        
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button id="checkoutBtn" class="checkout-btn">Checkout</button>
        </div>
    </div>

    <!-- Overlay -->
    <div id="overlay" class="overlay"></div>

    <script src="app.js"></script>
</body>
</html>
