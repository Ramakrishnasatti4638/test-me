<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Calendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .calendar-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
            padding: 30px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .calendar-header h1 {
            font-size: 28px;
            color: #333;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-buttons button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .nav-buttons button:hover {
            background: #5568d3;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-header {
            text-align: center;
            font-weight: bold;
            color: #667eea;
            padding: 10px;
            font-size: 14px;
        }

        .day-cell {
            min-height: 100px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .day-cell:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .day-cell.other-month {
            background: #f9fafb;
            color: #9ca3af;
        }

        .day-number {
            font-weight: bold;
            margin-bottom: 5px;
            color: #374151;
        }

        .day-cell.other-month .day-number {
            color: #9ca3af;
        }

        .events-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 5px;
        }

        .event-pill {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .event-pill:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .color-picker {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .color-option {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: #333;
            transform: scale(1.1);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }
    </style>
</head>
<body>
    <div class="calendar-container">
        <div class="calendar-header">
            <h1 id="monthYear"></h1>
            <div class="nav-buttons">
                <button id="prevMonth">← Previous</button>
                <button id="nextMonth">Next →</button>
            </div>
        </div>
        <div class="calendar" id="calendar"></div>
    </div>

    <!-- Modal for adding events -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <h2>Add Event</h2>
            <div class="form-group">
                <label for="eventTitle">Event Title</label>
                <input type="text" id="eventTitle" placeholder="Enter event title">
            </div>
            <div class="form-group">
                <label>Choose Color</label>
                <div class="color-picker" id="colorPicker"></div>
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" id="cancelBtn">Cancel</button>
                <button class="btn-primary" id="saveBtn">Save</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/calendar/events';
        
        let currentDate = new Date();
        let selectedDate = null;
        let events = [];
        
        const colors = [
            '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6',
            '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#84cc16'
        ];

        // Initialize
        async function init() {
            renderColorPicker();
            await loadEvents();
            renderCalendar();
            setupEventListeners();
        }

        // Load events from API
        async function loadEvents() {
            try {
                const response = await fetch(API_URL);
                events = await response.json();
            } catch (error) {
                console.error('Error loading events:', error);
                events = [];
            }
        }

        // Render color picker
        function renderColorPicker() {
            const colorPicker = document.getElementById('colorPicker');
            colors.forEach((color, index) => {
                const colorOption = document.createElement('div');
                colorOption.className = 'color-option';
                colorOption.style.backgroundColor = color;
                colorOption.dataset.color = color;
                if (index === 0) colorOption.classList.add('selected');
                
                colorOption.addEventListener('click', () => {
                    document.querySelectorAll('.color-option').forEach(opt => {
                        opt.classList.remove('selected');
                    });
                    colorOption.classList.add('selected');
                });
                
                colorPicker.appendChild(colorOption);
            });
        }

        // Render calendar
        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            const monthYear = document.getElementById('monthYear');
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            // Set header
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                               'July', 'August', 'September', 'October', 'November', 'December'];
            monthYear.textContent = `${monthNames[month]} ${year}`;
            
            // Clear calendar
            calendar.innerHTML = '';
            
            // Add day headers
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            dayNames.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.className = 'day-header';
                dayHeader.textContent = day;
                calendar.appendChild(dayHeader);
            });
            
            // Get first day of month and number of days
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            
            // Add previous month's trailing days
            for (let i = firstDay - 1; i >= 0; i--) {
                const dayCell = createDayCell(daysInPrevMonth - i, true, year, month - 1);
                calendar.appendChild(dayCell);
            }
            
            // Add current month's days
            for (let day = 1; day <= daysInMonth; day++) {
                const dayCell = createDayCell(day, false, year, month);
                calendar.appendChild(dayCell);
            }
            
            // Add next month's leading days
            const totalCells = calendar.children.length - 7; // Subtract day headers
            const remainingCells = 42 - totalCells; // 6 rows * 7 days
            for (let day = 1; day <= remainingCells; day++) {
                const dayCell = createDayCell(day, true, year, month + 1);
                calendar.appendChild(dayCell);
            }
        }

        // Create day cell
        function createDayCell(day, isOtherMonth, year, month) {
            const dayCell = document.createElement('div');
            dayCell.className = 'day-cell';
            if (isOtherMonth) dayCell.classList.add('other-month');
            
            const dayNumber = document.createElement('div');
            dayNumber.className = 'day-number';
            dayNumber.textContent = day;
            dayCell.appendChild(dayNumber);
            
            const eventsContainer = document.createElement('div');
            eventsContainer.className = 'events-container';
            
            // Add events for this day
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const dayEvents = events.filter(e => e.event_date === dateStr);
            
            dayEvents.forEach(event => {
                const eventPill = document.createElement('div');
                eventPill.className = 'event-pill';
                eventPill.textContent = event.title;
                eventPill.style.backgroundColor = event.color;
                eventPill.dataset.eventId = event.id;
                
                eventPill.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteEvent(event.id);
                });
                
                eventsContainer.appendChild(eventPill);
            });
            
            dayCell.appendChild(eventsContainer);
            
            // Add click handler to add event
            if (!isOtherMonth) {
                dayCell.addEventListener('click', () => {
                    selectedDate = dateStr;
                    openModal();
                });
            }
            
            return dayCell;
        }

        // Open modal
        function openModal() {
            document.getElementById('eventModal').style.display = 'block';
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventTitle').focus();
        }

        // Close modal
        function closeModal() {
            document.getElementById('eventModal').style.display = 'none';
        }

        // Add event
        async function addEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            if (!title) {
                alert('Please enter an event title');
                return;
            }
            
            const selectedColor = document.querySelector('.color-option.selected').dataset.color;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: title,
                        color: selectedColor,
                        event_date: selectedDate
                    })
                });
                
                if (response.ok) {
                    await loadEvents();
                    renderCalendar();
                    closeModal();
                }
            } catch (error) {
                console.error('Error adding event:', error);
                alert('Error adding event. Please try again.');
            }
        }

        // Delete event
        async function deleteEvent(eventId) {
            if (!confirm('Delete this event?')) return;
            
            try {
                const response = await fetch(`${API_URL}/${eventId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    await loadEvents();
                    renderCalendar();
                }
            } catch (error) {
                console.error('Error deleting event:', error);
                alert('Error deleting event. Please try again.');
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            document.getElementById('prevMonth').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            });
            
            document.getElementById('nextMonth').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            });
            
            document.getElementById('saveBtn').addEventListener('click', addEvent);
            document.getElementById('cancelBtn').addEventListener('click', closeModal);
            
            // Close modal on outside click
            window.addEventListener('click', (e) => {
                const modal = document.getElementById('eventModal');
                if (e.target === modal) {
                    closeModal();
                }
            });
            
            // Enter key to save
            document.getElementById('eventTitle').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addEvent();
                }
            });
        }

        // Initialize app
        init();
    </script>
</body>
</html>
