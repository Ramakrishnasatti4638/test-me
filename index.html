<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>My Todos</h1>
        <p class="subtitle">Stay organised, get things done.</p>
      </header>

      <!-- Add todo form -->
      <form id="todo-form" autocomplete="off">
        <div class="input-row">
          <input
            type="text"
            id="todo-input"
            placeholder="Add a new task…"
            maxlength="200"
            aria-label="New task"
          />
          <button type="submit" aria-label="Add task">Add</button>
        </div>
      </form>

      <!-- Filter tabs -->
      <div class="filters" role="tablist" aria-label="Filter todos">
        <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
        <button class="filter-btn" data-filter="active" role="tab" aria-selected="false">Active</button>
        <button class="filter-btn" data-filter="completed" role="tab" aria-selected="false">Completed</button>
      </div>

      <!-- Todo list -->
      <ul id="todo-list" aria-label="Todo list" aria-live="polite"></ul>

      <!-- Footer -->
      <footer id="todo-footer" class="hidden">
        <span id="items-left"></span>
        <button id="clear-completed">Clear completed</button>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
