<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>My Todos</h1>
      <p class="subtitle">Stay organised, get things done.</p>
    </header>

    <!-- Add todo form -->
    <form id="todo-form" autocomplete="off">
      <input
        type="text"
        id="todo-input"
        placeholder="What needs to be done?"
        maxlength="200"
        required
      />
      <button type="submit" aria-label="Add todo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </form>

    <!-- Filter tabs -->
    <div class="filters" role="tablist" aria-label="Filter todos">
      <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
      <button class="filter-btn" data-filter="active" role="tab" aria-selected="false">Active</button>
      <button class="filter-btn" data-filter="completed" role="tab" aria-selected="false">Completed</button>
    </div>

    <!-- Todo list -->
    <ul id="todo-list" aria-label="Todo list"></ul>

    <!-- Footer -->
    <div class="list-footer" id="list-footer" hidden>
      <span id="items-left"></span>
      <button id="clear-completed" class="text-btn">Clear completed</button>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round" width="56" height="56" aria-hidden="true">
        <rect x="8" y="8" width="48" height="56" rx="4"/>
        <line x1="20" y1="24" x2="44" y2="24"/>
        <line x1="20" y1="34" x2="44" y2="34"/>
        <line x1="20" y1="44" x2="32" y2="44"/>
      </svg>
      <p>Nothing here yet — add your first task!</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
