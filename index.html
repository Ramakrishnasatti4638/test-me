<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>Notes</h1>
        <button id="new-note-btn">+ New Note</button>
      </div>
      <div id="notes-list" class="notes-list"></div>
    </div>
    
    <div class="editor">
      <div id="editor-empty" class="editor-empty">
        <p>Select a note or create a new one</p>
      </div>
      <div id="editor-content" class="editor-content hidden">
        <input type="text" id="note-title" placeholder="Note title" />
        <textarea id="note-body" placeholder="Note content"></textarea>
        <div class="editor-actions">
          <button id="save-btn" class="btn-primary">Save</button>
          <button id="delete-btn" class="btn-danger">Delete</button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
