<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      width: 100%;
      max-width: 480px;
      padding: 32px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }

    .input-row input:focus { border-color: #6366f1; }

    .input-row button {
      padding: 10px 18px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #4f46e5; }

    .stats {
      font-size: 0.8rem;
      color: #6b7280;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 4px;
      border-bottom: 1px solid #f3f4f6;
      animation: fadeIn .2s ease;
    }

    li:last-child { border-bottom: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6366f1;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111;
      transition: color .2s;
      word-break: break-word;
    }

    .item-text.done {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #d1d5db;
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color .2s, background .2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #ef4444; background: #fef2f2; }

    .empty {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 9px;
      background: none;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #6b7280;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }

    .clear-btn:hover { border-color: #ef4444; color: #ef4444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📝 Todo List</h1>

    <div class="input-row">
      <input type="text" id="new-item" placeholder="Add a new task…" maxlength="200">
      <button id="add-btn">Add</button>
    </div>

    <p class="stats" id="stats"></p>
    <ul id="todo-list"></ul>
    <p class="empty" id="empty-msg">No tasks yet — add one above!</p>
    <button class="clear-btn" id="clear-btn">Clear completed</button>
  </div>

  <script>
    const input     = document.getElementById('new-item');
    const addBtn    = document.getElementById('add-btn');
    const list      = document.getElementById('todo-list');
    const emptyMsg  = document.getElementById('empty-msg');
    const statsEl   = document.getElementById('stats');
    const clearBtn  = document.getElementById('clear-btn');

    let todos = JSON.parse(localStorage.getItem('todos') || '[]');

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      list.innerHTML = '';

      todos.forEach((todo, i) => {
        const li = document.createElement('li');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.done;
        checkbox.addEventListener('change', () => { todos[i].done = checkbox.checked; save(); render(); });

        const span = document.createElement('span');
        span.className = 'item-text' + (todo.done ? ' done' : '');
        span.textContent = todo.text;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = 'Remove';
        del.addEventListener('click', () => { todos.splice(i, 1); save(); render(); });

        li.append(checkbox, span, del);
        list.appendChild(li);
      });

      const total = todos.length;
      const done  = todos.filter(t => t.done).length;

      emptyMsg.style.display  = total === 0 ? 'block' : 'none';
      clearBtn.style.display  = done > 0    ? 'block' : 'none';
      statsEl.textContent     = total > 0   ? `${done} of ${total} completed` : '';
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      todos.push({ text, done: false });
      input.value = '';
      save();
      render();
    }

    addBtn.addEventListener('click', addItem);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
    clearBtn.addEventListener('click', () => { todos = todos.filter(t => !t.done); save(); render(); });

    render();
  </script>
</body>
</html>
