<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }

        .question {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .question-text {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 12px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .option label {
            cursor: pointer;
            flex: 1;
            font-size: 1em;
            color: #555;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h2 {
            font-size: 1.8em;
            margin-bottom: 15px;
        }

        .result p {
            font-size: 1.3em;
        }

        .score-display {
            font-size: 3em;
            font-weight: bold;
            margin: 20px 0;
        }

        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 General Knowledge Quiz</h1>
        
        <form id="quizForm">
            <div class="question">
                <div class="question-text">1. What is the capital of France?</div>
                <div class="options">
                    <div class="option">
                        <input type="radio" id="q1a" name="q1" value="A" required>
                        <label for="q1a">A. Paris</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q1b" name="q1" value="B">
                        <label for="q1b">B. London</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q1c" name="q1" value="C">
                        <label for="q1c">C. Berlin</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q1d" name="q1" value="D">
                        <label for="q1d">D. Madrid</label>
                    </div>
                </div>
            </div>

            <div class="question">
                <div class="question-text">2. Which planet is known as the Red Planet?</div>
                <div class="options">
                    <div class="option">
                        <input type="radio" id="q2a" name="q2" value="A" required>
                        <label for="q2a">A. Venus</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q2b" name="q2" value="B">
                        <label for="q2b">B. Mars</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q2c" name="q2" value="C">
                        <label for="q2c">C. Jupiter</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q2d" name="q2" value="D">
                        <label for="q2d">D. Saturn</label>
                    </div>
                </div>
            </div>

            <div class="question">
                <div class="question-text">3. What is 2 + 2?</div>
                <div class="options">
                    <div class="option">
                        <input type="radio" id="q3a" name="q3" value="A" required>
                        <label for="q3a">A. 3</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q3b" name="q3" value="B">
                        <label for="q3b">B. 5</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q3c" name="q3" value="C">
                        <label for="q3c">C. 4</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q3d" name="q3" value="D">
                        <label for="q3d">D. 6</label>
                    </div>
                </div>
            </div>

            <div class="question">
                <div class="question-text">4. Which programming language is known for web development?</div>
                <div class="options">
                    <div class="option">
                        <input type="radio" id="q4a" name="q4" value="A" required>
                        <label for="q4a">A. JavaScript</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q4b" name="q4" value="B">
                        <label for="q4b">B. Python</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q4c" name="q4" value="C">
                        <label for="q4c">C. C++</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q4d" name="q4" value="D">
                        <label for="q4d">D. Swift</label>
                    </div>
                </div>
            </div>

            <div class="question">
                <div class="question-text">5. What is the largest ocean on Earth?</div>
                <div class="options">
                    <div class="option">
                        <input type="radio" id="q5a" name="q5" value="A" required>
                        <label for="q5a">A. Atlantic Ocean</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q5b" name="q5" value="B">
                        <label for="q5b">B. Indian Ocean</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q5c" name="q5" value="C">
                        <label for="q5c">C. Arctic Ocean</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="q5d" name="q5" value="D">
                        <label for="q5d">D. Pacific Ocean</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit Quiz</button>
        </form>

        <div id="result" class="result">
            <h2>Quiz Results</h2>
            <div class="score-display" id="scoreDisplay"></div>
            <p id="resultMessage"></p>
        </div>

        <div id="error" class="error"></div>
    </div>

    <script>
        const form = document.getElementById('quizForm');
        const resultDiv = document.getElementById('result');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const resultMessage = document.getElementById('resultMessage');
        const errorDiv = document.getElementById('error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            errorDiv.classList.remove('show');
            resultDiv.classList.remove('show');

            const answers = [];
            for (let i = 1; i <= 5; i++) {
                const answer = document.querySelector(`input[name="q${i}"]:checked`);
                answers.push(answer ? answer.value : null);
            }

            try {
                const submitBtn = form.querySelector('.submit-btn');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Submitting...';

                const response = await fetch('http://localhost:3000/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ answers })
                });

                if (!response.ok) {
                    throw new Error('Failed to submit quiz');
                }

                const data = await response.json();
                
                scoreDisplay.textContent = `${data.score} / ${data.total}`;
                
                const percentage = (data.score / data.total) * 100;
                let message = '';
                
                if (percentage === 100) {
                    message = '🎉 Perfect score! Excellent work!';
                } else if (percentage >= 80) {
                    message = '🌟 Great job! You did really well!';
                } else if (percentage >= 60) {
                    message = '👍 Good effort! Keep practicing!';
                } else {
                    message = '📚 Keep studying! You can do better!';
                }
                
                resultMessage.textContent = message;
                resultDiv.classList.add('show');
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Quiz';
            } catch (error) {
                errorDiv.textContent = `Error: ${error.message}. Make sure the backend server is running on port 3000.`;
                errorDiv.classList.add('show');
                
                const submitBtn = form.querySelector('.submit-btn');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Quiz';
            }
        });
    </script>
</body>
</html>
