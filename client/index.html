<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.8rem;
      color: #1a1a2e;
      margin-bottom: 1.5rem;
    }

    #status {
      color: #555;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    #messages {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .card .author {
      font-weight: 600;
      color: #4f46e5;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .card .text {
      color: #222;
      font-size: 1rem;
      line-height: 1.5;
    }

    .error {
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      max-width: 560px;
      width: 100%;
    }
  </style>
</head>
<body>
  <h1>💬 Messages</h1>
  <p id="status">Loading…</p>
  <div id="messages"></div>

  <script>
    const API = 'http://localhost:3000/messages';

    async function loadMessages() {
      const statusEl   = document.getElementById('status');
      const containerEl = document.getElementById('messages');

      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const messages = await res.json();

        statusEl.textContent = `${messages.length} message${messages.length !== 1 ? 's' : ''} loaded`;

        containerEl.innerHTML = messages.map(m => `
          <div class="card">
            <span class="author">${escapeHtml(m.author)}</span>
            <span class="text">${escapeHtml(m.text)}</span>
          </div>
        `).join('');
      } catch (err) {
        statusEl.textContent = '';
        containerEl.innerHTML = `
          <div class="error">
            ⚠️ Could not load messages: ${escapeHtml(err.message)}<br/>
            <small>Make sure the API server is running on port 3000.</small>
          </div>`;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    loadMessages();
  </script>
</body>
</html>
