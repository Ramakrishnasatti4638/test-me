<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }
        
        #messages {
            list-style: none;
        }
        
        .message {
            background: #f7f7f7;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-text {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        
        .message-time {
            color: #888;
            font-size: 0.85em;
        }
        
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        
        .error {
            background: #fee;
            border-left: 4px solid #f44;
            color: #c33;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            margin-top: 20px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📬 Messages</h1>
        <div id="content">
            <div class="loading">Loading messages...</div>
        </div>
        <button onclick="loadMessages()">Refresh Messages</button>
    </div>

    <script>
        async function loadMessages() {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '<div class="loading">Loading messages...</div>';
            
            try {
                const response = await fetch('http://localhost:3000/messages');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const messages = await response.json();
                
                if (messages.length === 0) {
                    contentDiv.innerHTML = '<div class="loading">No messages found.</div>';
                    return;
                }
                
                const messagesList = messages.map(msg => {
                    const time = new Date(msg.timestamp).toLocaleString();
                    return `
                        <li class="message">
                            <div class="message-text">${msg.text}</div>
                            <div class="message-time">${time}</div>
                        </li>
                    `;
                }).join('');
                
                contentDiv.innerHTML = `<ul id="messages">${messagesList}</ul>`;
                
            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error">
                        ❌ Error loading messages: ${error.message}
                        <br><br>
                        Make sure the backend server is running on port 3000
                    </div>
                `;
            }
        }
        
        // Load messages on page load
        loadMessages();
    </script>
</body>
</html>
