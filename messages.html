<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        #messagesList {
            list-style: none;
        }
        
        .message-item {
            background: #f8f9fa;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .message-item:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .message-text {
            color: #333;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .message-meta {
            color: #999;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 16px;
            padding: 20px;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid #c33;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 20px;
            transition: background 0.3s;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📬 Messages</h1>
        <p class="subtitle">Fetched from Node.js backend on port 3000</p>
        
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Loading messages...
            </div>
        </div>
        
        <button class="refresh-btn" onclick="loadMessages()">🔄 Refresh Messages</button>
    </div>

    <script>
        async function loadMessages() {
            const content = document.getElementById('content');
            
            content.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading messages...
                </div>
            `;
            
            try {
                const response = await fetch('http://localhost:3000/messages');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const messages = await response.json();
                
                if (messages.length === 0) {
                    content.innerHTML = '<p style="text-align: center; color: #999;">No messages found</p>';
                    return;
                }
                
                const messagesList = messages.map(msg => `
                    <li class="message-item">
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-meta">
                            <span>ID: ${msg.id}</span>
                            <span>${new Date(msg.timestamp).toLocaleString()}</span>
                        </div>
                    </li>
                `).join('');
                
                content.innerHTML = `<ul id="messagesList">${messagesList}</ul>`;
                
            } catch (error) {
                content.innerHTML = `
                    <div class="error">
                        <strong>Error loading messages:</strong><br>
                        ${escapeHtml(error.message)}<br><br>
                        Make sure the backend server is running on port 3000.
                    </div>
                `;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadMessages();
    </script>
</body>
</html>
