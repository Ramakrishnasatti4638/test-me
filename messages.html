<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #2d3748;
    }

    header p {
      color: #718096;
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    #status {
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      margin-bottom: 1.5rem;
    }

    #status.loading { background: #ebf8ff; color: #2b6cb0; }
    #status.error   { background: #fff5f5; color: #c53030; }
    #status.hidden  { display: none; }

    #messages {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      animation: fadeIn 0.3s ease both;
    }

    .message-card .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .message-card .author {
      font-weight: 600;
      font-size: 0.95rem;
      color: #4a5568;
    }

    .message-card .timestamp {
      font-size: 0.78rem;
      color: #a0aec0;
    }

    .message-card .text {
      font-size: 1rem;
      color: #2d3748;
      line-height: 1.5;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    button#reload {
      margin-top: 1.5rem;
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 8px;
      background: #4299e1;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button#reload:hover { background: #3182ce; }
  </style>
</head>
<body>
  <header>
    <h1>💬 Messages</h1>
    <p>Fetched live from <code>http://localhost:3000/messages</code></p>
  </header>

  <div id="status" class="loading">Loading messages…</div>

  <div id="messages"></div>

  <button id="reload">Reload</button>

  <script>
    const API_URL = 'http://localhost:3000/messages';

    function formatDate(iso) {
      try {
        return new Date(iso).toLocaleString();
      } catch {
        return iso;
      }
    }

    async function loadMessages() {
      const statusEl   = document.getElementById('status');
      const messagesEl = document.getElementById('messages');

      statusEl.textContent = 'Loading messages…';
      statusEl.className   = 'loading';
      messagesEl.innerHTML = '';

      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
        const messages = await res.json();

        if (!Array.isArray(messages) || messages.length === 0) {
          statusEl.textContent = 'No messages found.';
          statusEl.className   = 'loading';
          return;
        }

        statusEl.className = 'hidden';

        messages.forEach(msg => {
          const card = document.createElement('div');
          card.className = 'message-card';
          card.innerHTML = `
            <div class="meta">
              <span class="author">${escapeHtml(msg.author ?? 'Unknown')}</span>
              <span class="timestamp">${formatDate(msg.timestamp)}</span>
            </div>
            <div class="text">${escapeHtml(msg.text ?? '')}</div>
          `;
          messagesEl.appendChild(card);
        });
      } catch (err) {
        statusEl.textContent = `Error: ${err.message}. Is the API running on port 3000?`;
        statusEl.className   = 'error';
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    document.getElementById('reload').addEventListener('click', loadMessages);
    loadMessages();
  </script>
</body>
</html>
