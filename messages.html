<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        
        #loading {
            text-align: center;
            color: #667eea;
            font-size: 1.1em;
            padding: 20px;
        }
        
        #error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        
        .messages-list {
            list-style: none;
        }
        
        .message-item {
            background: #f8f9fa;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .message-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .message-id {
            font-size: 0.85em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .message-text {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 8px;
            line-height: 1.5;
        }
        
        .message-time {
            font-size: 0.85em;
            color: #999;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
        }
        
        .refresh-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📨 Messages</h1>
        <p class="subtitle">Fetching messages from Node.js backend</p>
        
        <div id="error"></div>
        <div id="loading">Loading messages...</div>
        <ul id="messages" class="messages-list"></ul>
        <button class="refresh-btn" onclick="loadMessages()">🔄 Refresh Messages</button>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/messages';
        
        async function loadMessages() {
            const loadingEl = document.getElementById('loading');
            const messagesEl = document.getElementById('messages');
            const errorEl = document.getElementById('error');
            
            loadingEl.style.display = 'block';
            messagesEl.innerHTML = '';
            errorEl.style.display = 'none';
            
            try {
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const messages = await response.json();
                
                loadingEl.style.display = 'none';
                
                if (messages.length === 0) {
                    messagesEl.innerHTML = '<li style="text-align: center; color: #999;">No messages found</li>';
                    return;
                }
                
                messages.forEach(msg => {
                    const li = document.createElement('li');
                    li.className = 'message-item';
                    
                    const date = new Date(msg.timestamp);
                    const formattedDate = date.toLocaleString();
                    
                    li.innerHTML = `
                        <div class="message-id">Message #${msg.id}</div>
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-time">⏰ ${formattedDate}</div>
                    `;
                    
                    messagesEl.appendChild(li);
                });
                
            } catch (error) {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.textContent = `Error loading messages: ${error.message}. Make sure the backend is running on port 3000.`;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadMessages();
    </script>
</body>
</html>
